; MANIFOLD — engine configuration (PC / Windows-first, deterministic simulation).
;
; The AndroidFileServer plugin (which auto-generates a local dev SecurityToken
; block here) is disabled in MANIFOLD.uproject, so that section no longer
; regenerates. This project targets PC and does not use Android file serving.

[/Script/EngineSettings.GameMapsSettings]
; Any level played in this project runs the MANIFOLD vertical-slice loop + HUD.
; (A startup .umap for standalone builds is authored in-editor — see Docs.)
GlobalDefaultGameMode=/Script/MANIFOLDGameplay.ManifoldGameMode

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12

[/Script/Engine.Engine]
; Deterministic fixed-step simulation is owned by the kernels; keep engine-side
; frame-rate smoothing out of the way so headless runs stay reproducible.
bSmoothFrameRate=False
