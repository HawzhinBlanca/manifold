name: MANIFOLD CI

# The engine (Unreal Engine 5.8) is not available on GitHub-hosted runners, so CI
# runs on a SELF-HOSTED Windows runner that has UE 5.8, the VS2022 C++ toolchain,
# the .NET Framework 4.8 SDK, and Git LFS installed. Label that runner `[self-hosted,
# windows, unreal]`. Until such a runner is registered, this workflow is a no-op
# placeholder that documents the gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Automation tests (headless)
    runs-on: [self-hosted, windows, unreal]
    env:
      UE_ROOT: 'C:\Program Files\Epic Games\UE_5.8'
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      # Single source of truth: run_tests.ps1 builds the editor target with UE's
      # bundled toolchain, runs every MANIFOLD.* automation test, exports a report,
      # and gates on the PARSED pass/fail counts (not just the process exit code).
      - name: Build + automation gate (headless)
        shell: pwsh
        run: |
          .\Tools\CI\run_tests.ps1 -UE5Path "$env:UE_ROOT"
          if ($LASTEXITCODE -ne 0) { throw "MANIFOLD CI gate failed (exit $LASTEXITCODE)" }

      - name: Upload automation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-report
          path: Tools/CI/test-results/
          if-no-files-found: ignore
